name: Deploy lia-desktop to Cloudflare Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-lia-desktop
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      VITE_API_URL: https://api.aneety.com
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      LIA_E2E_ALLOW_LEGACY_PROVIDER_AUTH: ${{ vars.LIA_E2E_ALLOW_LEGACY_PROVIDER_AUTH }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.2
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
      - name: Deploy to Cloudflare Pages
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=lia-desktop --branch=main
      - name: Install Playwright Chromium
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.LIA_E2E_ALLOW_LEGACY_PROVIDER_AUTH == '1' }}
        run: pnpm exec playwright install --with-deps chromium
      - name: Run published Desktop E2E
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        env:
          LIA_E2E_ENABLED: "1"
          LIA_E2E_DESKTOP_URL: https://desktop.aneety.com
          LIA_E2E_API_URL: https://api.aneety.com
          LIA_E2E_ADMIN_EMAIL: ${{ secrets.LIA_E2E_ADMIN_EMAIL }}
          LIA_E2E_ADMIN_PASSWORD: ${{ secrets.LIA_E2E_ADMIN_PASSWORD }}
        run: |
          if [ "${LIA_E2E_ALLOW_LEGACY_PROVIDER_AUTH:-}" != "1" ]; then
            echo "::warning::Skipping legacy provider-auth Desktop E2E. REQ.md now requires database-modeled Lia auth via /api/auth/*; replace this gate when the new E2E exists."
            exit 0
          fi
          missing=0
          for name in VITE_SUPABASE_URL VITE_SUPABASE_PUBLISHABLE_KEY LIA_E2E_ADMIN_EMAIL LIA_E2E_ADMIN_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::warning::Missing $name; skipping published Desktop E2E."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 0
          fi
          pnpm test:e2e
